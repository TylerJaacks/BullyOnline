[INFO]
mod_author: Xx_Yubari_xX
mod_help: Controls the weather.
require_dependency: sync+
require_version: 12

[SCRIPTS]
main_script: sv_weather.lua
client_script: cl_weather.lua

[WEATHERS]
dynamic_weather: 0, 120		# Sunny
dynamic_weather: 1, 40		# Cloudy
dynamic_weather: 2, 25		# Rainy
dynamic_weather: 3, 35		# Foggy
dynamic_weather: 4, 20		# ExtraSunny
dynamic_weather: 5, 10		# Hurricane

[PREFERENCES]
change_chance_per_interval: 15
change_chance_interval_ms: 90000
admin_command: true
admin_f2menu: true